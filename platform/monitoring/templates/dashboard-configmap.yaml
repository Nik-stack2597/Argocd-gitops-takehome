apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-grafana-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
data:
  argocd-dashboard.json: |-
    {
      "annotations": {
        "list": []
      },
      "description": "Argo CD operational dashboard — application health, sync status, reconciliation performance, and Git operations.",
      "editable": false,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Applications by Health Status",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "count by (health_status) (argocd_app_info)", "legendFormat": "{{`{{health_status}}`}}" }
          ],
          "options": { "legend": { "displayMode": "table", "placement": "right" } }
        },
        {
          "title": "Applications by Sync Status",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "count by (sync_status) (argocd_app_info)", "legendFormat": "{{`{{sync_status}}`}}" }
          ],
          "options": { "legend": { "displayMode": "table", "placement": "right" } }
        },
        {
          "title": "Sync Operations (rate/5m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(rate(argocd_app_sync_total[5m])) by (phase)", "legendFormat": "{{`{{phase}}`}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        {
          "title": "Reconciliation Duration (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "histogram_quantile(0.99, sum(rate(argocd_app_reconcile_bucket[5m])) by (le))", "legendFormat": "p99" },
            { "expr": "histogram_quantile(0.50, sum(rate(argocd_app_reconcile_bucket[5m])) by (le))", "legendFormat": "p50" }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "title": "Git Fetch Requests (rate/5m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(rate(argocd_git_request_total[5m])) by (request_type)", "legendFormat": "{{`{{request_type}}`}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "title": "Cluster API Server Requests (rate/5m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(rate(argocd_cluster_api_resource_objects[5m])) by (server)", "legendFormat": "objects — {{`{{server}}`}}" }
          ]
        },
        {
          "title": "Repo Server Pending Requests",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "argocd_repo_pending_request_total", "legendFormat": "pending" }
          ]
        },
        {
          "title": "Application Count",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "count(argocd_app_info)", "legendFormat": "total apps" }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["argocd", "gitops"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Argo CD Overview",
      "uid": "argocd-overview",
      "version": 1
    }
