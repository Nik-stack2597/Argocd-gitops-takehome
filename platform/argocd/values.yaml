argo-cd:
  global:
    logging:
      level: info
      format: json

  server:
    service:
      type: ClusterIP
    extraArgs:
      - --insecure
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argocd
        additionalLabels:
          release: monitoring

  controller:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argocd
        additionalLabels:
          release: monitoring

  repoServer:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argocd
        additionalLabels:
          release: monitoring

    volumes:
      - name: custom-tools
        emptyDir: {}

    initContainers:
      - name: download-helm
        image: alpine:3.20
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            HELM_VERSION="3.16.4"
            ARCH="amd64"
            echo "Downloading Helm v${HELM_VERSION}..."
            wget -qO- "https://get.helm.sh/helm-v${HELM_VERSION}-linux-${ARCH}.tar.gz" \
              | tar xz -C /tmp
            mv /tmp/linux-${ARCH}/helm /custom-tools/helm
            chmod +x /custom-tools/helm
            echo "Helm v${HELM_VERSION} installed to /custom-tools/helm"
            /custom-tools/helm version --short
        volumeMounts:
          - mountPath: /custom-tools
            name: custom-tools

    volumeMounts:
      - mountPath: /usr/local/bin/helm
        name: custom-tools
        subPath: helm

  applicationSet:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argocd
        additionalLabels:
          release: monitoring

  notifications:
    enabled: true
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argocd
        additionalLabels:
          release: monitoring

  redis:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: argocd
        additionalLabels:
          release: monitoring

  configs:
    params:
      server.insecure: true
    cm:
      timeout.reconciliation: 180s
      resource.exclusions: |
        - apiGroups:
            - tekton.dev
          clusters:
            - '*'
          kinds:
            - TaskRun
            - PipelineRun
